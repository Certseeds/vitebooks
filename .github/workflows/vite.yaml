name: github pages

on:
  push:
    branches: [ "master" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: certseeds/common-actions/actions/checkout@v1
        with:
          fetch-depth: 0

      - uses: certseeds/common-actions/actions/setup-pnpm@v1

      - name: Install Node.js
        uses: certseeds/common-actions/actions/setup-node@v1

      - name: Install Rust
        uses: certseeds/common-actions/actions/setup-rust@v1
        with:
          toolchain: stable

      # do not update to v3.9+, it will loss footnote reverse
      - uses: certseeds/common-actions/actions/setup-pandoc@v1

      - name: Rust Cache
        uses: certseeds/common-actions/actions/cache-rust@v1
        with:
          workspaces: "./depage/rustydeps"

      - name: scan and append names.txt
        run: |
          pnpm \
            exec node \
            --experimental-strip-types \
            --experimental-transform-types \
             ./scripts/run-listname.ts

      - name: add wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        working-directory: ./depage/rustydeps
        run: |
          version=$(sed -n 's/wasm-pack = "\(.*\)"/\1/p' Cargo.toml) && \
          cargo install wasm-pack --version "${version}" --locked

      - name: build rustydeps
        working-directory: ./depage/rustydeps
        run: |
          cargo build --release
          wasm-pack build --target web --release
          cp ./target/release/toepub ./../../scripts/toepub.exe

      - name: Install dependencies
        run: pnpm install

      - name: scan and build meta.tgz, epubs
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          echo 'Run number: $RUN_NUMBER'
          pnpm exec node ./scripts/maketgz.js $RUN_NUMBER

      - name: scan and get epub page
        run: |
          pnpm \
            exec node \
            --experimental-strip-types \
            --experimental-transform-types \
            ./scripts/run-epublist.ts
  
      - name: build depage
        working-directory: ./depage
        run: pnpm build

      - name: build web-cmp-trans
        working-directory: ./web-cmp-translate
        run: pnpm build

      - name: build turndown
        working-directory: ./turndown
        run: pnpm build

      - name: build webdoc
        working-directory: ./webdoc
        run: pnpm build

      - name: cp subprojects
        run: |
          mkdir -p ./public/depage
          mkdir -p ./public/web-cmp-trans
          mkdir -p ./public/turndown
          mkdir -p ./public/webdoc
          cp -r ./depage/dist/* ./public/depage/
          cp -r ./web-cmp-translate/dist/* ./public/web-cmp-trans/
          cp -r ./turndown/dist/* ./public/turndown/
          cp -r ./webdoc/dist/* ./public/webdoc/


      - name: build
        run: pnpm run build

      - name: Upload artifact
        uses: certseeds/common-actions/actions/upload-pages-artifact@v1
        with:
          path: ./dist

      - name: cp epub to cf-public
        run: |
          sudo apt-get update
          sudo apt-get install rename
          mkdir -p ./cf-public/epub
          mkdir -p ./cf-public/stable/epub
          cp ./*.epub ./cf-public/epub
          cp ./*.epub ./cf-public/stable/epub
          rename \
            's/(.*)-[0-9]{4}-[0-9]{8}\.epub$/$1.epub/' \
            ./cf-public/stable/epub/*.epub

      - name: Install Wrangler
        run: pnpm add -w wrangler@latest

      - name: Publish to Cloudflare Pages
        uses: certseeds/common-actions/actions/wrangler@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./cf-public  --branch="main" --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }} --commit-dirty=true

  # Deployment job
  deploy:
    # Add a dependency to the build job
    needs: build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    runs-on: ubuntu-latest

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # Specify runner + deployment step
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: certseeds/common-actions/actions/deploy-pages@v1